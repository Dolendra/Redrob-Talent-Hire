ai_tools_used:
  - "Cursor"
  - "Claude"

ai_usage_summary: |
  Used Cursor/Claude for architecture, implementation, and code review.
  No candidate data was sent to external LLM APIs during ranking.

methodology_summary: |
  Redrob-Talent-Hire ranks candidates with semantic embeddings (all-MiniLM-L6-v2) for Current Fit
  and Skill Transferability, plus Adaptability (36-month timeline tech adoption) and Career
  Velocity. Future Fit = 0.40·ST + 0.30·AS + 0.30·CV. Hidden Gem rewards high Future Fit
  with low Current Fit (ATS miss). Composite score blends fit, opportunity, confidence,
  location, experience band, hiring risk, JD disqualifiers, and honeypot penalties.
  Two-pass streaming over 100K JSONL with heap top-100; contrastive fact-slot reasoning.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
